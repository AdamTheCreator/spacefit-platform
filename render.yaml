# Render.com Infrastructure as Code
# Documentation: https://render.com/docs/blueprint-spec

databases:
  - name: spacefit-db
    plan: free # Change to 'starter' ($7/mo) for production
    databaseName: spacefit
    user: spacefit
    ipAllowList: [] # Allow all IPs (default for Render internal)

services:
  # Backend API Service
  - type: web
    name: spacefit-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter # $7/mo — always-on, no cold starts
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spacefit-db
          property: connectionString
        # Transform to asyncpg URL
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_MASTER_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://spacefit.onrender.com
      - key: GOOGLE_REDIRECT_URI
        value: https://spacefit-api.onrender.com/api/v1/auth/google/callback
      - key: GMAIL_REDIRECT_URI
        value: https://spacefit-api.onrender.com/api/v1/auth/gmail/callback
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_PRICE_ID
        sync: false
      # Transactional email (Resend) — without this, password-reset and
      # verification emails silently no-op. Set the actual key in the
      # Render dashboard.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@perigee.ai
      - key: RESEND_FROM_NAME
        value: Perigee
      # SMTP (Gmail / SendGrid / etc.) for the outreach worker. Optional
      # — unset means the outreach sender path is disabled.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: Perigee
      - key: SMTP_USE_TLS
        value: "true"

  # Frontend Static Site
  - type: web
    name: spacefit
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      # Explicit CSP. No 'unsafe-eval' — the production bundle is eval-free
      # (verified by scanning dist/ after `vite build`). Google Fonts (styles +
      # glyphs) and the Google Places autocomplete endpoint used by
      # AddressAutocomplete are the only cross-origin dependencies. If a new
      # third-party origin is added to the SPA, allow it here.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://spacefit-api.onrender.com wss://spacefit-api.onrender.com https://maps.googleapis.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # Host only — consumers in the frontend append `/api/v1` themselves
        # (see axios.ts, main.tsx prewarm, SocialLoginButtons, SharedReportPage).
        # Including the prefix here produces `/api/v1/api/v1/...` 404s.
        value: https://spacefit-api.onrender.com
      - key: VITE_WS_URL
        # Chat WebSocket host. useChat.ts appends /api/v1/chat/ws itself.
        # Falls back to ws://localhost:8000 in dev; without an explicit
        # value a blueprint-driven deploy would leave the bundle pointed
        # at localhost and chat would silently fail in production.
        value: wss://spacefit-api.onrender.com
