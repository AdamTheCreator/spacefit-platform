# Render.com Infrastructure as Code
# Documentation: https://render.com/docs/blueprint-spec

databases:
  - name: perigee-db
    plan: free # Change to 'starter' ($7/mo) for production
    databaseName: perigee
    user: perigee
    ipAllowList: [] # Allow all IPs (default for Render internal)

services:
  # Backend API Service
  - type: web
    name: perigee-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free # Change to 'starter' ($7/mo) for always-on
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: perigee-db
          property: connectionString
        # Transform to asyncpg URL
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_MASTER_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false # Set manually in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://perigee.onrender.com
      - key: GOOGLE_REDIRECT_URI
        value: https://perigee-api.onrender.com/api/v1/auth/google/callback
      - key: GMAIL_REDIRECT_URI
        value: https://perigee-api.onrender.com/api/v1/auth/gmail/callback
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_PRICE_ID
        sync: false

  # Frontend Static Site
  - type: web
    name: perigee
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://perigee-api.onrender.com/api/v1
