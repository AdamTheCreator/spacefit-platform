version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spacegoose
      POSTGRES_PASSWORD: spacegoose_dev_password
      POSTGRES_DB: spacegoose
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacegoose -d spacegoose"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://spacegoose:spacegoose_dev_password@db:5432/spacegoose
      SECRET_KEY: ${SECRET_KEY:-development-secret-key-change-in-production}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:-development-encryption-key-32bytes!}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      CENSUS_API_KEY: ${CENSUS_API_KEY:-}
      FRONTEND_URL: http://localhost:5173
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/browser_sessions:/app/browser_sessions
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Host only — the frontend (axios.ts, main.tsx, useChat.ts, etc.)
        # appends /api/v1 itself. Including the prefix here produces
        # /api/v1/api/v1/... 404s in the dev container.
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
