connector_id: placer
name: Placer.ai
version: "1.0.0"
description: >
  Retrieves visitor traffic data, customer profiles, and void analysis
  from Placer.ai.  Supports both API and browser modes.  Browser mode
  is used when API access is unavailable.

auth_type: session_state
auth_config:
  login_url: https://analytics.placer.ai/auth/signin
  session_cookie_name: login
  captcha_likely: true

execution_modes:
  - browser
  - api
default_mode: browser

allowed_domains:
  - analytics.placer.ai
  - placer.ai
  - api.placer.ai

capabilities:
  - visitor_traffic
  - customer_profile
  - void_analysis
  - trade_area

rate_limit:
  requests_per_minute: 10
  burst: 3
  cooldown_seconds: 5

runtime_limits:
  max_runtime_seconds: 120
  max_navigation_steps: 30
  max_extracted_bytes: 10000000

required_inputs:
  - key: address
    label: Property address
    type: string
    required: true
    description: Full street address of the property to analyze.
  - key: date_range
    label: Date range
    type: string
    required: false
    description: "Date range for traffic data (e.g. 'last_12_months')."

required_secrets:
  - key: username
    description: Placer.ai login email
    required: true
  - key: password
    description: Placer.ai login password
    required: true

output_schema:
  ref: ""
  inline:
    type: object
    properties:
      property_name:
        type: string
      visits:
        type: object
        properties:
          total:
            type: integer
          trend:
            type: array
      customer_profile:
        type: object
      trade_area:
        type: object

workflow_file: workflow.yaml

module: app.connectors.examples.placer.connector.PlacerConnector

maintainer: platform-team
tags:
  - placer
  - visitor-traffic
  - real-estate
  - browser-required
